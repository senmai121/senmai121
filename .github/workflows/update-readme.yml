name: Update README Projects

on:
  schedule:
    - cron: '0 0 * * *'   # รันทุกวัน เที่ยงคืน UTC
  push:
    branches: [main]       # รันทุกครั้งที่ push ขึ้น main ด้วย
  workflow_dispatch:        # กด Run manually ได้จาก GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt-in Node.js 24

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # อนุญาตให้ commit กลับเข้า repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync to latest remote
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: python .github/scripts/update_readme.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: auto-update featured projects [skip ci]"
          git push origin HEAD:main
